<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Triad Chord Finder</title>
  <style>
    /* Layout only. No colouring beyond keeping text black and links blue. */
    body {
      color: black;
      background: white;
      font-family: sans-serif;
      line-height: 1.5;
      max-width: 640px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    a {
      color: blue;
    }

    h1 {
      font-size: 1.4rem;
    }

    section {
      margin: 1.25rem 0;
    }

    label {
      display: block;
      margin: 0.25rem 0;
    }

    .note-row {
      margin: 0.5rem 0;
    }

    .note-row select {
      margin-right: 0.5rem;
    }

    #result {
      margin-top: 1rem;
    }

    ul {
      margin: 0.25rem 0;
    }

    small {
      display: block;
      margin-top: 0.5rem;
    }
  </style>
</head>

<body>

  <h1>Triad Chord Finder</h1>
  <p>Pick three notes and it will name the triad. Optionally choose a key signature
    to enter notes by letter and have the sharps/flats applied automatically.</p>

  <section>
    <label for="keySelect"><strong>Key signature</strong></label>
    <select id="keySelect"></select>
  </section>

  <section id="noteInputs"></section>

  <section>
    <button id="findBtn" type="button">Find chord</button>
  </section>

  <section id="result"></section>

  <small>
    Triads: major, minor, diminished, augmented, suspended 4th.
    Chord reference:
    <a href="https://www.piano-keyboard-guide.com/piano-chords.html" target="_blank" rel="noopener">
      piano-keyboard-guide.com</a>.
  </small>

  <script>
    "use strict";

    /* ------------------------------------------------------------------ *
     * DATA
     * ------------------------------------------------------------------ */

    // Letter names and their "natural" pitch class (semitones above C).
    const LETTERS = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const NATURAL_PC = [0, 2, 4, 5, 7, 9, 11];

    // The 12 chromatic notes, used by the direct picker. Value = pitch class.
    const CHROMATIC = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    // The five triad types, each as [letterStep, semitones] for its three tones.
    // letterStep is how many letter names up from the root (0 = root itself).
    const QUALITIES = [
      { label: 'major', tones: [[0, 0], [2, 4], [4, 7]] },
      { label: 'minor', tones: [[0, 0], [2, 3], [4, 7]] },
      { label: 'diminished', tones: [[0, 0], [2, 3], [4, 6]] },
      { label: 'augmented', tones: [[0, 0], [2, 4], [4, 8]] },
      { label: 'suspended 4th', tones: [[0, 0], [3, 5], [4, 7]] },
    ];

    // The canonical root spelling for each pitch class: [letterIndex, accidentalOffset].
    // Offset: 0 natural, 1 sharp, -1 flat. These match the naming used by the
    // reference chart (C#, Eb, F#, Ab, Bb...) so chords come out named the way a
    // pianist expects.
    const ROOT_SPELLING = {
      0: [0, 0],   // C
      1: [0, 1],   // C#
      2: [1, 0],   // D
      3: [2, -1],   // Eb
      4: [2, 0],   // E
      5: [3, 0],   // F
      6: [3, 1],   // F#
      7: [4, 0],   // G
      8: [5, -1],   // Ab
      9: [5, 0],   // A
      10: [6, -1],   // Bb
      11: [6, 0],   // B
    };

    // Key signatures. Each lists the letters that are sharpened OR flattened.
    const KEYS = [
      { name: 'None' },
      { name: 'G major / E minor (1♯)', sharps: ['F'] },
      { name: 'D major / B minor (2♯)', sharps: ['F', 'C'] },
      { name: 'A major / F♯ minor (3♯)', sharps: ['F', 'C', 'G'] },
      { name: 'E major / C♯ minor (4♯)', sharps: ['F', 'C', 'G', 'D'] },
      { name: 'B major / G♯ minor (5♯)', sharps: ['F', 'C', 'G', 'D', 'A'] },
      { name: 'F♯ major / D♯ minor (6♯)', sharps: ['F', 'C', 'G', 'D', 'A', 'E'] },
      { name: 'C♯ major / A♯ minor (7♯)', sharps: ['F', 'C', 'G', 'D', 'A', 'E', 'B'] },
      { name: 'F major / D minor (1♭)', flats: ['B'] },
      { name: 'B♭ major / G minor (2♭)', flats: ['B', 'E'] },
      { name: 'E♭ major / C minor (3♭)', flats: ['B', 'E', 'A'] },
      { name: 'A♭ major / F minor (4♭)', flats: ['B', 'E', 'A', 'D'] },
      { name: 'D♭ major / B♭ minor (5♭)', flats: ['B', 'E', 'A', 'D', 'G'] },
      { name: 'G♭ major / E♭ minor (6♭)', flats: ['B', 'E', 'A', 'D', 'G', 'C'] },
      { name: 'C♭ major / A♭ minor (7♭)', flats: ['B', 'E', 'A', 'D', 'G', 'C', 'F'] },
    ];

    /* ------------------------------------------------------------------ *
     * MUSIC HELPERS
     * ------------------------------------------------------------------ */

    function mod12(n) { return ((n % 12) + 12) % 12; }

    // Turn an accidental offset into text: 1 -> "#", -1 -> "b", 2 -> "##", etc.
    function accStr(off) {
      if (off === 0) return '';
      return (off > 0 ? '#' : 'b').repeat(Math.abs(off));
    }

    function noteName(letterIdx, accOff) {
      return LETTERS[letterIdx] + accStr(accOff);
    }

    // Spell a triad from a given root letter/accidental. Returns the chord name
    // and its three tone names, each with the correct letter and accidental.
    function spellTriad(rootLetterIdx, rootAccOff, quality) {
      const rootPc = mod12(NATURAL_PC[rootLetterIdx] + rootAccOff);
      const tones = [];

      for (const [step, semis] of quality.tones) {
        const li = (rootLetterIdx + step) % 7;
        const target = mod12(rootPc + semis);
        let acc = mod12(target - NATURAL_PC[li]);
        if (acc > 6) acc -= 12;              // fold into range -5..6
        tones.push(noteName(li, acc));
      }

      return {
        name: noteName(rootLetterIdx, rootAccOff) + ' ' + quality.label,
        tones: tones,
      };
    }

    // Find every triad that the given notes spell.
    //   notes: [{ pc, letterIdx, accOff }]  (letterIdx/accOff only used when fixed)
    //   fixed: true in key-signature mode, where spelling is dictated by input.
    function findChords(notes, fixed) {
      const pcs = notes.map(n => n.pc);
      if (new Set(pcs).size < 3) return [];   // need three different notes

      const found = [];

      for (let r = 0; r < notes.length; r++) {
        const rootPc = notes[r].pc;
        const relative = new Set(pcs.map(p => mod12(p - rootPc)));

        for (const quality of QUALITIES) {
          const needed = new Set(quality.tones.map(t => t[1]));
          const matches = relative.size === needed.size &&
            [...needed].every(x => relative.has(x));
          if (!matches) continue;

          // Root spelling: dictated by input in key mode, else the canonical one.
          const [li, ao] = fixed
            ? [notes[r].letterIdx, notes[r].accOff]
            : ROOT_SPELLING[rootPc];

          found.push(spellTriad(li, ao, quality));
        }
      }

      // Remove any duplicate names, keeping the order found.
      const seen = new Set();
      return found.filter(c => (seen.has(c.name) ? false : seen.add(c.name)));
    }

    /* ------------------------------------------------------------------ *
     * USER INTERFACE
     * ------------------------------------------------------------------ */

    const keySelect = document.getElementById('keySelect');
    const noteInputs = document.getElementById('noteInputs');
    const result = document.getElementById('result');

    // Populate the key-signature dropdown.
    KEYS.forEach((key, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = key.name;
      keySelect.appendChild(opt);
    });

    // Build the note inputs to match the selected mode.
    function renderInputs() {
      const key = KEYS[keySelect.value];
      noteInputs.innerHTML = '';
      result.innerHTML = '';

      for (let i = 0; i < 3; i++) {
        const row = document.createElement('div');
        row.className = 'note-row';

        if (!key.sharps && !key.flats) {
          // Chromatic mode: choose one of the 12 notes directly.
          const sel = document.createElement('select');
          sel.className = 'chromatic';
          CHROMATIC.forEach((name, pc) => {
            const opt = document.createElement('option');
            opt.value = pc;
            opt.textContent = name;
            sel.appendChild(opt);
          });
          sel.selectedIndex = [0, 4, 7][i];   // default to a C major shape
          row.appendChild(sel);
        } else {
          // Key mode: choose a letter; accidental comes from the key signature.
          const sel = document.createElement('select');
          sel.className = 'letter';
          LETTERS.forEach((name, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = name;
            sel.appendChild(opt);
          });
          sel.selectedIndex = [0, 2, 4][i];

          const label = document.createElement('label');
          label.style.display = 'inline';
          const box = document.createElement('input');
          box.type = 'checkbox';
          box.className = 'natural';
          label.appendChild(box);
          label.appendChild(document.createTextNode(' ♮ natural'));

          row.appendChild(sel);
          row.appendChild(label);
        }
        noteInputs.appendChild(row);
      }
    }

    // Read the three inputs into note objects.
    function collectNotes() {
      const key = KEYS[keySelect.value];
      const rows = noteInputs.querySelectorAll('.note-row');
      const notes = [];

      rows.forEach(row => {
        if (!key.sharps && !key.flats) {
          const pc = Number(row.querySelector('.chromatic').value);
          notes.push({ pc: pc });
        } else {
          const li = Number(row.querySelector('.letter').value);
          const isNatural = row.querySelector('.natural').checked;
          const letter = LETTERS[li];
          let accOff = 0;
          if (!isNatural) {
            if ((key.sharps || []).includes(letter)) accOff = 1;
            else if ((key.flats || []).includes(letter)) accOff = -1;
          }
          notes.push({ pc: mod12(NATURAL_PC[li] + accOff), letterIdx: li, accOff: accOff });
        }
      });
      return notes;
    }

    function showResult() {
      const key = KEYS[keySelect.value];
      const fixed = !!(key.sharps || key.flats);
      const notes = collectNotes();
      const chords = findChords(notes, fixed);

      result.innerHTML = '';

      // In key mode, echo the notes so the applied accidentals are visible.
      if (fixed) {
        const p = document.createElement('p');
        p.textContent = 'Notes entered: ' +
          notes.map(n => noteName(n.letterIdx, n.accOff)).join('  ');
        result.appendChild(p);
      }

      if (chords.length === 0) {
        const p = document.createElement('p');
        p.textContent =
          'No triad matches those notes. Choose three different notes that form a ' +
          'triad (major, minor, diminished, augmented or suspended 4th). If you are ' +
          'entering notes by letter, pick the key signature so the correct sharps or ' +
          'flats are applied.';
        result.appendChild(p);
        return;
      }

      const heading = document.createElement('p');
      heading.textContent = chords.length === 1 ? 'Chord found:' : 'Possible chords:';
      result.appendChild(heading);

      const ul = document.createElement('ul');
      chords.forEach(c => {
        const li = document.createElement('li');
        li.innerHTML = '<strong>' + c.name + '</strong> — ' + c.tones.join(' ');
        ul.appendChild(li);
      });
      result.appendChild(ul);
    }

    keySelect.addEventListener('change', renderInputs);
    document.getElementById('findBtn').addEventListener('click', showResult);

    renderInputs();   // initial render
  </script>

</body>

</html>
